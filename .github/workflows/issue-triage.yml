name: SDD Issue Triage

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  triage:
    # Skip if this issue was already triaged (e.g. re-opened)
    if: "!contains(github.event.issue.labels.*.name, 'sdd/triage')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute next SPEC-N and classify issue
        id: triage-meta
        uses: actions/github-script@v7
        with:
          script: |
            // --- Compute next SPEC-N by scanning spec directories ---
            let maxN = 0;
            const dirs = ['specs/active', 'specs/artifacts', 'specs/completed'];
            for (const dir of dirs) {
              let entries = [];
              try {
                const resp = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: dir,
                });
                entries = resp.data;
              } catch (e) {
                continue; // directory may not exist
              }
              for (const entry of entries) {
                const m = entry.name.match(/^SPEC-(\d+)/i);
                if (m) maxN = Math.max(maxN, parseInt(m[1], 10));
              }
            }
            const nextN = maxN + 1;

            // --- Build kebab slug from issue title ---
            const title = context.payload.issue.title || '';
            const slug = title
              .toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .trim()
              .replace(/\s+/g, '-')
              .substring(0, 40)
              .replace(/-+$/, '');
            const specId = `SPEC-${nextN}-${slug}`;
            const specFile = `specs/active/${specId}.md`;

            core.setOutput('spec_n', String(nextN));
            core.setOutput('spec_id', specId);
            core.setOutput('spec_file', specFile);

            // --- Classify issue type from title/body keywords ---
            const body = (context.payload.issue.body || '').toLowerCase();
            const issueTitle = title.toLowerCase();
            let classification = 'feature';
            if (issueTitle.includes('bug') || body.includes('steps to reproduce') || body.includes('expected behavior')) {
              classification = 'bug';
            } else if (issueTitle.includes('chore') || issueTitle.includes('refactor') || issueTitle.includes('cleanup')) {
              classification = 'chore';
            }
            core.setOutput('classification', classification);

      - name: Create draft spec file
        uses: actions/github-script@v7
        with:
          script: |
            const specId = '${{ steps.triage-meta.outputs.spec_id }}';
            const specFile = '${{ steps.triage-meta.outputs.spec_file }}';
            const classification = '${{ steps.triage-meta.outputs.classification }}';
            const issueTitle = context.payload.issue.title || '';
            const issueBody = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            const content = [
              `# Feature Specification: ${issueTitle}`,
              '',
              `> **Spec ID:** ${specId}`,
              '> **Status:** Draft',
              `> **Source Issue:** #${issueNumber}`,
              `> **Classification:** ${classification}`,
              '> **Author:** Auto-generated by issue-triage workflow',
              `> **Created:** ${new Date().toISOString().slice(0, 10)}`,
              '',
              '---',
              '',
              '## 1. Overview',
              '',
              '### 1.1 Summary',
              '_Extracted from issue body — to be refined in Phase 1 Analysis_',
              '',
              issueBody,
              '',
              '---',
              '',
              '## Agent Workflow Tracking',
              '',
              '### Phase 1: Analysis',
              '- **Status:** Not Started',
              `- **Artifact:** \`specs/artifacts/${specId}/01-analysis.md\``,
              '',
              '### Phase 2: Design',
              '- **Status:** Not Started',
              `- **Artifact:** \`specs/artifacts/${specId}/02-design.md\``,
              '',
              '### Phase 3: Implementation',
              '- **Status:** Not Started',
              `- **Artifact:** \`specs/artifacts/${specId}/03-implementation.md\``,
              '',
              '### Phase 4: QA & Testing',
              '- **Status:** Not Started',
              `- **Artifact:** \`specs/artifacts/${specId}/04-qa-report.md\``,
              '',
            ].join('\n');

            const encoded = Buffer.from(content).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: specFile,
              message: `chore: create draft spec ${specId} from issue #${issueNumber}`,
              content: encoded,
            });
            core.info(`Created spec file: ${specFile}`);

      - name: Run Claude triage analysis
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowed-tools Read,Bash(find:*),Bash(gh issue comment:*)'
          prompt: |
            You are the SDD Triage agent for this repository.

            A new GitHub issue has been opened:

            ISSUE NUMBER: #${{ github.event.issue.number }}
            ISSUE TITLE: ${{ github.event.issue.title }}
            CLASSIFICATION: ${{ steps.triage-meta.outputs.classification }}
            SPEC ID: ${{ steps.triage-meta.outputs.spec_id }}
            SPEC FILE: ${{ steps.triage-meta.outputs.spec_file }}

            ISSUE BODY:
            ${{ github.event.issue.body }}

            Your tasks:
            1. Read the spec file at `${{ steps.triage-meta.outputs.spec_file }}` (already created with the raw issue content).
            2. Read `specs/README.md` and `AGENTS.md` to understand the SDD workflow.
            3. Post a single structured comment on issue #${{ github.event.issue.number }} with these sections:
               - **Classification**: bug / feature / chore — with a 1-sentence rationale
               - **Spec ID assigned**: ${{ steps.triage-meta.outputs.spec_id }}
               - **Summary of what will be built** (3-5 bullet points)
               - **Open Questions** — 3-5 specific questions that must be answered before Phase 1 analysis begins
               - **Estimated complexity**: Low / Medium / High with rationale
               - **Next step**: instruct the issue author/maintainers to answer the open questions, then have an approved collaborator comment `/start-sdd` to begin Phase 1 Analysis

            Post the comment using:
            gh issue comment ${{ github.event.issue.number }} --body "<comment text>"

            Do NOT modify any source code or spec files. Do NOT create anything other than the issue comment.

      - name: Label issue as sdd/triage
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['sdd/triage'],
            });
